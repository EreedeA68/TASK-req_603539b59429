name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make docker-compose available (shim for Docker Compose v2)
        run: |
          printf '#!/bin/bash\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Run full test suite
        working-directory: repo/meridianmart
        run: |
          chmod +x run_tests.sh
          ./run_tests.sh

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: repo/meridianmart/coverage-report/
          if-no-files-found: warn
