spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:meridianmart}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER:meridian}
    password: ${DB_PASSWORD:meridian_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss

  security:
    filter:
      order: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${APP_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  aes:
    key: ${AES_KEY}
  rate-limit:
    requests-per-minute: 60
  brute-force:
    max-attempts: 5
    lock-duration-minutes: 15
  recommendations:
    ttl-minutes: 60
    min-shared-interactions: 3
    top-n: 10
    cold-start-days: 30
  notifications:
    max-per-day: 5
  backup:
    retention-days: 30
  request-signing:
    max-age-seconds: 300
    secret: ${REQUEST_SIGNING_SECRET}

logging:
  level:
    com.meridianmart: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: testSecretKeyForUnitTestingOnlyDoNotUseInProduction1234567890
    expiration-ms: 86400000
  aes:
    key: TestAES256KeyMustBe32BytesLongXX
  request-signing:
    max-age-seconds: 300
    secret: testRequestSigningSecretKeyForTestsOnlyDoNotUseInProd
