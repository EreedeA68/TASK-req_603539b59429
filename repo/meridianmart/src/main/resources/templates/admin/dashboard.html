<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/home">MeridianMart</a>
    <ul class="navbar-nav">
        <li><a href="/home">Home</a></li>
        <li><a href="/staff/dashboard">Staff Tools</a></li>
        <li><a href="/notifications">Notifications <span class="badge" id="notif-badge"></span></a></li>
        <li><button class="logout-btn">Logout</button></li>
    </ul>
</nav>

<div class="container" id="admin-dashboard">
    <div class="page-title">Admin Dashboard</div>

    <div id="admin-alerts"></div>

    <div class="card" style="margin-bottom:1.5rem">
        <div class="section-header">
            <h2 class="section-title">Feature Flags</h2>
        </div>
        <table class="table">
            <thead>
                <tr><th>Flag</th><th>Store</th><th>Enabled</th><th>Updated By</th><th>Updated At</th></tr>
            </thead>
            <tbody id="flags-list"></tbody>
        </table>
    </div>

    <div class="card">
        <div class="section-header">
            <h2 class="section-title">Compliance Reports</h2>
        </div>
        <div id="compliance-data">
            <div class="loading" style="display:block"><div class="spinner"></div></div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
