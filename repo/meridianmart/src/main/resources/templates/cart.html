<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Cart</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/home">MeridianMart</a>
    <ul class="navbar-nav">
        <li><a href="/home">Catalog</a></li>
        <li><a href="/orders">Orders</a></li>
        <li><a href="/notifications">Notifications <span class="badge" id="notif-badge"></span></a></li>
        <li><button class="logout-btn">Logout</button></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">Shopping Cart</div>

    <div class="card">
        <div id="cart-container">
            <div class="loading" style="display:block"><div class="spinner"></div></div>
        </div>
        <div id="cart-total" class="cart-total" style="display:none"></div>
        <div style="display:flex;justify-content:flex-end;margin-top:1rem">
            <button id="checkout-btn" class="btn btn-primary" style="display:none">
                Proceed to Checkout
            </button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
