<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Checkout</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/home">MeridianMart</a>
    <ul class="navbar-nav">
        <li><a href="/cart">Cart</a></li>
        <li><button class="logout-btn">Logout</button></li>
    </ul>
</nav>

<div class="container">
    <div class="page-title">Checkout</div>

    <div id="checkout-alerts"></div>

    <div class="card" id="checkout-form">
        <h2 style="margin-bottom:1rem;font-size:1.1rem;font-weight:600">Order Summary</h2>
        <div id="order-summary">
            <div class="loading" style="display:block"><div class="spinner"></div></div>
        </div>

        <div id="checkout-loading" class="loading" style="margin-top:1rem">
            <div class="spinner"></div>
            <p style="margin-top:0.5rem;color:var(--text-muted)">Processing your order...</p>
        </div>

        <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem">
            <a href="/cart" class="btn btn-outline">Back to Cart</a>
            <button id="confirm-btn" class="btn btn-success">Confirm Purchase</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
