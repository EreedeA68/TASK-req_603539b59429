<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Sign In</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card card">
        <div class="login-title">
            <h1>MeridianMart</h1>
            <p style="color:var(--text-muted);margin-top:0.5rem">Sign in to your account</p>
        </div>

        <div id="login-error" class="alert alert-danger" style="display:none">
            Invalid username or password.
        </div>

        <div id="locked-message" class="alert alert-warning" style="display:none">
            Your account has been locked after 5 failed attempts. Please try again in 15 minutes.
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">
                Sign In
            </button>
        </form>
    </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
