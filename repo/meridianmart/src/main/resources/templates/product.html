<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Product</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/home">MeridianMart</a>
    <ul class="navbar-nav">
        <li><a href="/cart">Cart</a></li>
        <li><a href="/orders">Orders</a></li>
        <li><a href="/notifications">Notifications <span class="badge" id="notif-badge"></span></a></li>
        <li><button class="logout-btn">Logout</button></li>
    </ul>
</nav>

<div class="container" id="product-detail">
    <a href="/home" style="color:var(--primary);text-decoration:none;font-size:0.9rem">&larr; Back to catalog</a>

    <div id="product-alerts" style="margin-top:1rem"></div>

    <div id="cart-success" class="alert alert-success" style="display:none;margin-top:1rem">
        ✓ Added to cart!
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1.5rem" class="product-layout">
        <div>
            <img id="product-img" src="/images/placeholder.svg" alt="Product"
                 style="width:100%;border-radius:var(--radius);max-height:400px;object-fit:cover;background:#f1f5f9"
                 onerror="this.src='/images/placeholder.svg'">
        </div>
        <div>
            <div id="product-category" class="product-card-category" style="margin-bottom:0.5rem"></div>
            <h1 id="product-name" style="font-size:1.6rem;margin-bottom:0.5rem"></h1>
            <div id="product-price" class="product-card-price" style="font-size:1.8rem;margin-bottom:1rem"></div>
            <p id="product-description" style="color:var(--text-muted);line-height:1.6;margin-bottom:1rem"></p>
            <div id="product-stock" style="color:var(--text-muted);margin-bottom:0.5rem"></div>
            <div id="stock-warning" class="stock-warning" style="display:none;margin-bottom:1rem">
                ⚠ Only a few left in stock!
            </div>

            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem">
                <button id="add-to-cart-btn" class="btn btn-primary">Add to Cart</button>
                <button id="add-to-fav-btn" class="btn btn-outline">♥ Add to Favorites</button>
            </div>

            <div style="margin-bottom:1.5rem">
                <div style="font-weight:600;margin-bottom:0.5rem">Rate this product:</div>
                <div class="star-rating">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
            </div>
        </div>
    </div>

    <div style="margin-top:3rem">
        <div class="section-header">
            <h2 class="section-title">Recommended for you</h2>
        </div>
        <div id="product-rec-grid" class="product-grid"></div>
    </div>
</div>

<style>
@media (max-width:768px) {
    .product-layout { grid-template-columns: 1fr !important; }
}
</style>
<script src="/js/app.js"></script>
</body>
</html>
