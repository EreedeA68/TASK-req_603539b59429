<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeridianMart - Staff Dashboard</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/home">MeridianMart</a>
    <ul class="navbar-nav">
        <li><a href="/home">Home</a></li>
        <li><a href="/notifications">Notifications <span class="badge" id="notif-badge"></span></a></li>
        <li><button class="logout-btn">Logout</button></li>
    </ul>
</nav>

<div class="container" id="staff-dashboard">
    <div class="page-title">Staff Dashboard</div>

    <div id="staff-alerts"></div>

    <div class="card" style="margin-bottom:1.5rem">
        <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:1rem">Transaction Lookup</h2>
        <div style="display:flex;gap:1rem;align-items:center">
            <input type="text" id="receipt-input" class="form-control" placeholder="Enter receipt number (e.g. RCP-20240101-001)" style="flex:1">
            <button id="receipt-search-btn" class="btn btn-primary">Search</button>
        </div>
    </div>

    <div id="transaction-panel" class="card" style="display:none">
        <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:1rem">Transaction Details</h2>
        <input type="hidden" id="tx-order-id">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1rem">
            <div>
                <div style="font-size:0.8rem;color:var(--text-muted)">Receipt Number</div>
                <div id="tx-receipt" style="font-family:monospace;font-weight:700"></div>
            </div>
            <div>
                <div style="font-size:0.8rem;color:var(--text-muted)">Time</div>
                <div id="tx-time"></div>
            </div>
            <div>
                <div style="font-size:0.8rem;color:var(--text-muted)">Total</div>
                <div id="tx-amount" style="font-weight:700;font-size:1.2rem"></div>
            </div>
            <div>
                <div style="font-size:0.8rem;color:var(--text-muted)">Status</div>
                <span id="tx-status" class="status-badge"></span>
            </div>
        </div>

        <table class="table" style="margin-bottom:1rem">
            <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th></tr></thead>
            <tbody id="tx-items"></tbody>
        </table>

        <div style="display:flex;gap:1rem">
            <button id="pos-confirm-btn" class="btn btn-success">POS Confirm</button>
            <button id="refund-btn" class="btn btn-danger">Initiate Refund</button>
            <button id="pickup-btn" class="btn btn-primary">Mark Ready for Pickup</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
